<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>指数估值自动监控</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{max-width:1000px;margin:20px auto;font-family:Arial}
table{width:100%;border-collapse:collapse;margin:20px 0}
th,td{border:1px solid #ccc;padding:8px;text-align:center}
</style>
</head>
<body>
<h2>📈 指数PE估值折线图 & 高低判断</h2>
<canvas id="chart" height="300"></canvas>
<table id="table">
  <tr><th>指数</th><th>日期</th><th>PE</th><th>PB</th><th>估值状态</th></tr>
</table>

<script>
fetch("data.json").then(res=>res.json()).then(data=>{
  const ctx = document.getElementById("chart").getContext("2d");
  const datasets = [];
  const table = document.getElementById("table");

  data.forEach(item=>{
    // 画折线
    datasets.push({
      label: item.name,
      data: [{x:item.date,y:item.pe}],
      borderColor: item.color,
      tension:0.3
    })
    // 表格
    const tr = document.createElement("tr");
    tr.innerHTML = `<td>${item.name}</td><td>${item.date}</td><td>${item.pe}</td><td>${item.pb}</td><td style="color:${item.color}">${item.level}</td>`;
    table.appendChild(tr);
  })

  new Chart(ctx,{
    type:"line",
    data:{datasets:datasets},
    options:{scales:{x:{title:{text:"日期"}},y:{title:{text:"PE估值"}}}}
  })
})
</script>
</body>
</html>
