<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>指数估值</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{padding:20px;font-family:system-ui;background:#f7f8fa}
.container{max-width:900px;margin:0 auto;background:#fff;padding:20px;border-radius:12px}
h2{text-align:center;margin-bottom:20px;color:#222}
#tip{text-align:center;margin:10px 0;color:#666}
</style>
</head>
<body>
<div class="container">
  <h2>指数PE估值走势</h2>
  <div id="tip">正在加载数据...</div>
  <canvas id="kline" height="350"></canvas>
</div>

<script>
fetch("history.json")
.then(res=>res.json())
.then(data=>{
  const dates = data.map(d=>d.date)
  const hs300 = data.map(d=>d.hs300_pe)

  new Chart(document.getElementById("kline"),{
    type:"line",
    data:{
      labels:dates,
      datasets:[{
        label:"沪深300 PE",
        data:hs300,
        borderColor:"#ff6600",
        fill:false,
        tension:0.2
      }]
    }
  })
  document.getElementById("tip").innerText = "数据更新：" + data.at(-1).date
})
.catch(()=>{
  document.getElementById("tip").innerText = "暂无数据，请等待自动运行生成"
})
</script>
</body>
</html>
