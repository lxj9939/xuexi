<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>指数估值</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{max-width:1000px;margin:30px auto;font-family:system-ui}
h2{text-align:center}
#info{text-align:center;margin:10px 0}
</style>
</head>
<body>
<h2>指数估值走势</h2>
<div id="info">加载中...</div>
<canvas id="chart" height="350"></canvas>

<script>
fetch("history.json")
.then(res=>res.json())
.then(list=>{
  const dates = list.map(x=>x.date);
  const hs300 = list.map(x=>x.hs300_pe);
  const zz500 = list.map(x=>x.zz500_pe);
  const cybz = list.map(x=>x.cybz_pe);

  new Chart(document.getElementById('chart'), {
    type:"line",
    data:{
      labels:dates,
      datasets:[
        {label:"沪深300",data:hs300,borderColor:"#f60",fill:false},
        {label:"中证500",data:zz500,borderColor:"#06f",fill:false},
        {label:"创业板",data:cybz,borderColor:"#0a3",fill:false}
      ]
    }
  })
  const last = list[list.length-1];
  document.getElementById("info").innerHTML = `更新：${last.date}`
})
.catch(err=>{
  document.getElementById("info").innerHTML = "数据加载失败，请等待自动运行生成数据"
})
</script>
</body>
</html>
